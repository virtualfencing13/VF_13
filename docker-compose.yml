# docker-compose.yml
version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_DB: fenceai
      POSTGRES_USER: fenceai
      POSTGRES_PASSWORD: fenceai123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5444:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: fenceai
      MINIO_ROOT_PASSWORD: fenceai123
    volumes:
      - minio_data:/data
    ports:
      - "9002:9000"
      - "9003:9001"

  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "8555:8554" # RTSP
      - "8891:8889" # WebRTC
      - "8890:8888" # HLS

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"

  adminer:
    image: adminer:latest
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - postgres

#   celery:
