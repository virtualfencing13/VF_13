#     environment:
#       - REDIS_URL=redis://redis:6379
#       - DATABASE_URL=postgresql://fenceai:fenceai123@postgres/fenceai
#     depends_on:
#       - redis
#       - postgres

volumes:
  postgres_data:
  minio_data:
  grafana_data:
